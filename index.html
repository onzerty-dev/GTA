<!DOCTYPE html>
<html lang="fr" data-theme="dark" data-device="desktop">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="MAILA Ultra-Control Panel - Galerie de medias avec modération et favoris" />
    <meta name="theme-color" content="#030305" />
    <title>MAILA Ultra-Control Panel v12.0</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>+</text></svg>" />

    <style>
        /* ======================
           CONFIGURATION GLOBALE
        ====================== */
        :root {
            /* Theme sombre */
            --bg-deep: #030305;
            --bg-secondary: #0a0a0f;
            --bg-card: rgba(15, 15, 25, 0.7);
            --glass: rgba(15, 15, 25, 0.7);
            --glass-bright: rgba(255, 255, 255, 0.05);
            --accent: #ff2d7a;
            --accent-glow: rgba(255, 45, 122, 0.5);
            --accent2: #9d4eff;
            --text-main: #ffffff;
            --text-muted: #8e8e9e;
            --border-ui: rgba(255, 255, 255, 0.08);
            --card-w: 340px;
            --card-h: 240px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-glow: 0 0 20px var(--accent-glow);
            --scrollbar-thumb: var(--accent2);
            --scrollbar-track: transparent;
            --header-height: 80px;
            --controls-height: 100px;
        }

        /* Theme clair */
        [data-theme="light"] {
            --bg-deep: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --glass: rgba(255, 255, 255, 0.9);
            --glass-bright: rgba(0, 0, 0, 0.05);
            --text-main: #1a1a1a;
            --text-muted: #6c6c6c;
            --border-ui: rgba(0, 0, 0, 0.1);
            --scrollbar-thumb: var(--accent);
        }

        /* ======================
           VERSION MOBILE
        ====================== */
        [data-device="mobile"] {
            --card-w: 100%;
            --card-h: 200px;
            --header-height: 60px;
            --controls-height: 90px;
        }

        /* ======================
           RESET & BASE
        ====================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.6;
            -webkit-overflow-scrolling: touch;
        }

        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Sélection de texte */
        ::selection {
            background: var(--accent);
            color: white;
        }

        /* ======================
           ARRIERE-PLAN
        ====================== */
        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://files.catbox.moe/0qk3ab.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(50px) brightness(0.3);
            z-index: -1;
            transform: scale(1.2);
            pointer-events: none;
            opacity: 0.5;
        }

        [data-theme="light"] .page-background {
            filter: blur(50px) brightness(0.8);
        }

        /* ======================
           HEADER & NAVIGATION
        ====================== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border-ui);
            z-index: 2000;
            display: flex;
            align-items: center;
        }

        [data-theme="light"] header {
            background: rgba(255, 255, 255, 0.7);
        }

        [data-device="mobile"] header {
            justify-content: space-between;
            padding: 0 10px;
        }

        .nav-container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        [data-device="mobile"] .nav-container {
            padding: 0 10px;
        }

        .main-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--text-main);
            text-decoration: none;
            border: 2px solid var(--accent);
            padding: 8px 18px;
            border-radius: 4px;
            box-shadow: var(--shadow-glow);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        [data-device="mobile"] .main-logo {
            font-size: 1.2rem;
            padding: 6px 12px;
            letter-spacing: 4px;
        }

        .main-logo:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        [data-device="mobile"] .nav-actions {
            gap: 10px;
        }

        .action-btn {
            background: var(--glass-bright);
            border: 1px solid var(--border-ui);
            color: var(--text-main);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: var(--transition);
            position: relative;
        }

        [data-device="mobile"] .action-btn {
            width: 40px;
            height: 40px;
            font-size: 1rem;
            border-radius: 10px;
        }

        .action-btn:hover {
            background: var(--accent2);
            border-color: var(--accent2);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(157, 78, 255, 0.3);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: white;
            font-size: 0.6rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 50%;
            min-width: 18px;
            text-align: center;
        }

        [data-device="mobile"] .action-btn .badge {
            font-size: 0.5rem;
            padding: 1px 4px;
            min-width: 14px;
        }

        .theme-toggle {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 10px;
            border-radius: 10px;
            transition: var(--transition);
        }

        [data-device="mobile"] .theme-toggle {
            font-size: 1rem;
            padding: 8px;
        }

        .theme-toggle:hover {
            background: var(--glass-bright);
        }

        .mobile-menu-btn {
            display: none;
            background: var(--glass-bright);
            border: 1px solid var(--border-ui);
            color: var(--text-main);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        [data-device="mobile"] .mobile-menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ======================
           HERO SECTION
        ====================== */
        .hero-section {
            height: 55vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-top: var(--header-height);
            overflow: hidden;
            background: var(--bg-secondary);
        }

        [data-device="mobile"] .hero-section {
            height: 40vh;
            margin-top: var(--header-height);
        }

        .hero-media-fixed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://files.catbox.moe/0qk3ab.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(10px);
            opacity: 0.6;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: globalFloat 5s infinite ease-in-out;
        }

        @keyframes globalFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        [data-device="mobile"] .hero-content {
            animation: none;
        }

        .discord-tag {
            position: absolute;
            top: -40px;
            right: -60px;
            background: var(--accent2);
            color: white;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: 900;
            font-family: 'JetBrains Mono';
            transform: rotate(12deg);
            border-radius: 8px;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            z-index: 15;
            transition: var(--transition);
        }

        [data-device="mobile"] .discord-tag {
            display: none;
        }

        .discord-tag:hover {
            transform: rotate(12deg) scale(1.1);
            box-shadow: 8px 8px 0px rgba(157, 78, 255, 0.6);
        }

        .hero-content h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 10vw, 7rem);
            line-height: 0.85;
            text-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        [data-device="mobile"] .hero-content h1 {
            font-size: clamp(1.8rem, 8vw, 3rem);
        }

        .hero-content h1 span {
            color: var(--accent2);
            display: block;
            font-size: 0.5em;
            letter-spacing: 15px;
            margin-top: 10px;
        }

        .hero-subtitle {
            margin-top: 20px;
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 2px;
        }

        [data-device="mobile"] .hero-subtitle {
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* ======================
           CONTROLES (RECHERCHE & CATEGORIES)
        ====================== */
        .controls-wrapper {
            position: sticky;
            top: var(--header-height);
            z-index: 1500;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-ui);
            padding: 20px 0;
        }

        [data-device="mobile"] .controls-wrapper {
            top: var(--header-height);
            padding: 10px 0;
        }

        .search-area {
            max-width: 700px;
            margin: 0 auto 20px;
            padding: 0 30px;
            display: flex;
            gap: 10px;
        }

        [data-device="mobile"] .search-area {
            max-width: 100%;
            padding: 0 10px;
            margin: 0 auto 10px;
            flex-direction: column;
            gap: 8px;
        }

        .search-field {
            flex: 1;
            background: var(--glass-bright);
            border: 1px solid var(--border-ui);
            padding: 18px 25px;
            border-radius: 15px;
            color: var(--text-main);
            outline: none;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }

        [data-device="mobile"] .search-field {
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .search-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 45, 122, 0.2);
        }

        .search-field::placeholder {
            color: var(--text-muted);
        }

        .filter-btn {
            background: var(--glass-bright);
            border: 1px solid var(--border-ui);
            color: var(--text-main);
            padding: 0 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        [data-device="mobile"] .filter-btn {
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            width: 100%;
            justify-content: center;
        }

        .filter-btn:hover {
            background: var(--accent2);
            border-color: var(--accent2);
        }

        .filter-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-ui);
            border-radius: 15px;
            padding: 10px;
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 3000;
            display: none;
        }

        [data-device="mobile"] .filter-menu {
            position: fixed;
            top: auto;
            bottom: 70px;
            left: 10px;
            right: 10px;
            margin-top: 0;
            min-width: auto;
            max-width: none;
            width: calc(100% - 20px);
        }

        .filter-menu.active {
            display: block;
        }

        .filter-option {
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        [data-device="mobile"] .filter-option {
            padding: 12px 10px;
            font-size: 0.9rem;
        }

        .filter-option:hover {
            background: var(--glass-bright);
        }

        .filter-option input {
            margin-right: 8px;
        }

        .category-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 0 30px;
            justify-content: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        [data-device="mobile"] .category-scroll {
            padding: 0 10px;
            gap: 8px;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .cat-tag {
            background: var(--glass-bright);
            border: 1px solid var(--border-ui);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            cursor: pointer;
            text-transform: uppercase;
            transition: var(--transition);
            white-space: nowrap;
            user-select: none;
        }

        [data-device="mobile"] .cat-tag {
            padding: 8px 15px;
            font-size: 0.7rem;
            border-radius: 20px;
        }

        .cat-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .cat-tag.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: var(--shadow-glow);
        }

        /* ======================
           GRID DE CONTENU
        ====================== */
        .content-grid {
            max-width: 1600px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
            gap: 25px;
            padding: 0 30px;
        }

        [data-device="mobile"] .content-grid {
            max-width: 100%;
            margin: 10px auto;
            gap: 15px;
            padding: 0 10px;
        }

        @media (max-width: 768px) and (min-width: 481px) {
            .content-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
                padding: 0 15px;
            }
        }

        .media-card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-ui);
            overflow: hidden;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
        }

        [data-device="mobile"] .media-card {
            border-radius: 12px;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .media-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            border-color: var(--accent);
        }

        [data-device="mobile"] .media-card:active {
            transform: scale(0.98);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            height: var(--card-h);
            background: #000;
            cursor: pointer;
            overflow: hidden;
        }

        [data-device="mobile"] .thumbnail-container {
            height: var(--card-h);
        }

        .thumbnail-container img,
        .thumbnail-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .thumbnail-container:hover img,
        .thumbnail-container:hover video {
            transform: scale(1.05);
        }

        .card-spoiler {
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 10, 0.98);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        [data-device="mobile"] .card-spoiler {
            gap: 5px;
        }

        .card-spoiler.hidden {
            display: none;
        }

        .card-spoiler i {
            font-size: 2rem;
            color: var(--text-muted);
        }

        [data-device="mobile"] .card-spoiler i {
            font-size: 1.5rem;
        }

        .card-spoiler span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 3px;
        }

        [data-device="mobile"] .card-spoiler span {
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .card-info {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        [data-device="mobile"] .card-info {
            padding: 10px;
        }

        .card-ref {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        [data-device="mobile"] .card-ref {
            font-size: 0.65rem;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        [data-device="mobile"] .card-actions {
            gap: 8px;
        }

        .card-actions i {
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        [data-device="mobile"] .card-actions i {
            font-size: 0.8rem;
        }

        .card-actions i.fav {
            color: var(--text-muted);
        }

        .card-actions i.fav.active {
            color: var(--accent);
        }

        .card-actions i.download {
            color: var(--text-muted);
        }

        .card-actions i.download:hover {
            color: var(--accent2);
        }

        /* ======================
           FAVORIS (MODAL)
        ====================== */
        .fav-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-ui);
            cursor: pointer;
            transition: var(--transition);
        }

        [data-device="mobile"] .fav-item {
            aspect-ratio: 16/9;
            border-radius: 8px;
        }

        .fav-item:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .fav-item:active {
            transform: scale(0.98);
        }

        .fav-item img,
        .fav-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-fav-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        [data-device="mobile"] .remove-fav-btn {
            width: 24px;
            height: 24px;
            font-size: 0.7rem;
        }

        .remove-fav-btn:hover {
            background: #e6005c;
            transform: rotate(90deg);
        }

        /* ======================
           LIGHTBOX (VISIONNEUSE)
        ====================== */
        #media-viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 9999;
            backdrop-filter: blur(30px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        [data-device="mobile"] #media-viewer {
            padding: 10px;
        }

        #media-viewer.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .viewer-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        [data-device="mobile"] .viewer-content {
            max-height: 80vh;
        }

        .viewer-content img,
        .viewer-content video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 10px;
        }

        .viewer-actions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        [data-device="mobile"] .viewer-actions {
            bottom: 20px;
            gap: 10px;
            padding: 8px 15px;
        }

        .viewer-actions button {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: var(--transition);
        }

        [data-device="mobile"] .viewer-actions button {
            font-size: 1rem;
            padding: 6px;
        }

        .viewer-actions button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ======================
           MODALES
        ====================== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 8000;
            backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        [data-device="mobile"] .modal-overlay {
            padding: 10px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-body {
            background: var(--bg-secondary);
            border: 2px solid var(--accent2);
            width: 90%;
            max-width: 500px;
            border-radius: 30px;
            padding: 40px;
            position: relative;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        [data-device="mobile"] .modal-body {
            width: 95%;
            max-width: none;
            border-radius: 20px;
            padding: 20px;
            max-height: 85vh;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }

        [data-device="mobile"] .modal-close {
            top: 15px;
            right: 15px;
            font-size: 1.2rem;
        }

        .modal-close:hover {
            color: var(--accent);
        }

        .paypal-btn-huge {
            width: 100%;
            background: #0070ba;
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            margin-top: 20px;
        }

        [data-device="mobile"] .paypal-btn-huge {
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        .paypal-btn-huge:hover {
            background: #005f9e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4);
        }

        /* ======================
           NOTIFICATIONS
        ====================== */
        #notification-center {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        [data-device="mobile"] #notification-center {
            bottom: 20px;
            width: 90%;
            left: 5%;
            transform: none;
        }

        .toast-msg {
            background: var(--accent2);
            padding: 12px 30px;
            border-radius: 50px;
            color: white;
            margin-bottom: 10px;
            animation: slideUp 0.4s ease;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(157, 78, 255, 0.3);
        }

        [data-device="mobile"] .toast-msg {
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            width: 100%;
            justify-content: center;
        }

        .toast-msg.success {
            background: #2ecc71;
        }

        .toast-msg.error {
            background: #e74c3c;
        }

        .toast-msg.warning {
            background: #f39c12;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ======================
           LOADING SPINNER
        ====================== */
        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid var(--glass-bright);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        [data-device="mobile"] .loading-spinner {
            width: 30px;
            height: 30px;
            border-width: 3px;
            margin: 10px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ======================
           BOUTON "CHARGER PLUS"
        ====================== */
        .load-more-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            background: var(--glass-bright);
            border: 1px solid var(--border-ui);
            color: var(--text-main);
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        [data-device="mobile"] .load-more-btn {
            margin: 15px auto;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 0.9rem;
        }

        .load-more-btn:hover {
            background: var(--accent2);
            border-color: var(--accent2);
            transform: translateY(-2px);
        }

        .load-more-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ======================
           PANNEAU DE PARAMETRES
        ====================== */
        .settings-panel {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 60px;
            height: 60px;
            background: var(--bg-card);
            border: 1px solid var(--border-ui);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--text-muted);
            transition: var(--transition);
            z-index: 9000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        [data-device="mobile"] .settings-panel {
            width: 50px;
            height: 50px;
            font-size: 1.2rem;
            right: 10px;
            bottom: 10px;
        }

        .settings-panel:hover {
            background: var(--accent2);
            color: white;
            transform: rotate(90deg);
        }

        .settings-modal {
            position: fixed;
            right: 20px;
            bottom: 100px;
            width: 300px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-ui);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 9000;
            display: none;
        }

        [data-device="mobile"] .settings-modal {
            right: 10px;
            bottom: 80px;
            width: calc(100% - 20px);
            max-width: 300px;
            border-radius: 15px;
        }

        .settings-modal.active {
            display: block;
            animation: slideUp 0.3s ease;
        }

        .settings-modal h3 {
            margin-bottom: 15px;
            font-size: 1rem;
            color: var(--text-main);
        }

        [data-device="mobile"] .settings-modal h3 {
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .settings-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-ui);
        }

        [data-device="mobile"] .settings-option {
            padding: 8px 0;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        .settings-option:last-child {
            border-bottom: none;
        }

        .settings-option label {
            cursor: pointer;
        }

        [data-device="mobile"] .settings-option label {
            font-size: 0.9rem;
        }

        .settings-option select,
        .settings-option input {
            background: var(--glass-bright);
            border: 1px solid var(--border-ui);
            color: var(--text-main);
            padding: 8px;
            border-radius: 8px;
        }

        [data-device="mobile"] .settings-option select,
        [data-device="mobile"] .settings-option input {
            padding: 6px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        /* ======================
           MENU MOBILE
        ====================== */
        .mobile-menu {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-ui);
            padding: 15px;
            z-index: 2000;
            flex-direction: column;
            gap: 10px;
        }

        [data-device="mobile"] .mobile-menu {
            display: flex;
        }

        .mobile-menu-btn {
            display: none;
        }

        [data-device="mobile"] .mobile-menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mobile-menu-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: var(--glass-bright);
            border: 1px solid var(--border-ui);
            border-radius: 12px;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .mobile-menu-item:hover {
            background: var(--accent2);
            border-color: var(--accent2);
        }

        .mobile-menu-item:active {
            transform: scale(0.98);
        }

        .mobile-menu-item i {
            font-size: 1.1rem;
        }

        .mobile-menu-item span {
            font-weight: 600;
        }

        /* ======================
           RESPONSIVE (DESKTOP)
        ====================== */
        @media (max-width: 768px) and (min-width: 481px) {
            .content-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
                padding: 0 15px;
            }

            .hero-content h1 {
                font-size: clamp(2rem, 8vw, 4rem);
            }
        }
    </style>
</head>
<body>

    <!-- Header -->

    <!-- Controles (Recherche & Categories) -->

                <p style="font-size: 0.7rem; color: var(--accent); font-weight: 900;">NOTE PAYPAL :</p>

            <select id="cardsPerLoad" onchange="updateSettings()">
                <option value="6">6</option>
                <option value="12" selected>12</option>
                <option value="18">18</option>
                <option value="24">24</option>
            </select>

            <label for="spoilerEnabled">Masquer les miniatures:</label>
            <select id="spoilerEnabled" onchange="updateSettings()">
                <option value="true" selected>Oui</option>

            <button onclick="toggleFavorite(currentViewerUrl, null)" title="Ajouter aux favoris">
                <i class="fas fa-heart" id="viewerFavIcon"></i>
            </button>
            <button onclick="toggleFullscreen()" title="Plein ecran"><i class="fas fa-expand"></i></button>
            <button onclick="closeViewer()" title="Fermer"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // ======================
        // DETECTION DE L'APPAREIL
        // ======================
        function detectDevice() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent) ||
                           (navigator.maxTouchPoints > 0) ||
                           (window.innerWidth <= 768 && window.innerHeight <= 1024);

            document.body.setAttribute('data-device', isMobile ? 'mobile' : 'desktop');
            return isMobile ? 'mobile' : 'desktop';
        }

        // ======================
        // CONFIGURATION GLOBALE
        // ======================
        const CATEGORIES = ["pgif", "hentai", "hneko", "ass", "hboobs", "hthigh", "paizuri", "hmidriff", "hbikini"];
        const LABELS = ["Global", "Hentai", "Anime", "Fessier", "Poitrine", "Cuisses", "Special", "Ventre", "Bikini"];
        const API_URLS = {
            pgif: "https://nekobot.xyz/api/image?type=pgif",
            hentai: "https://nekobot.xyz/api/image?type=hentai",
            hneko: "https://nekobot.xyz/api/image?type=hneko",
            ass: "https://nekobot.xyz/api/image?type=ass",
            hboobs: "https://nekobot.xyz/api/image?type=hboobs",
            hthigh: "https://nekobot.xyz/api/image?type=hthigh",
            paizuri: "https://nekobot.xyz/api/image?type=paizuri",
            hmidriff: "https://nekobot.xyz/api/image?type=hmidriff",
            hbikini: "https://nekobot.xyz/api/image?type=hbikini"
        };

        // Etat de l'application
        let currentCategory = "pgif";
        let favs = JSON.parse(localStorage.getItem('maila_favs_v12')) || [];
        let isLoading = false;
        let loadedUrls = new Set();
        let currentViewerUrl = null;
        let currentFilter = "all";
        let settings = JSON.parse(localStorage.getItem('maila_settings_v12')) || {
            cardsPerLoad: 12,
            autoPlayVideos: false,
            spoilerEnabled: true,
            theme: "dark",
            themeColor: "#ff2d7a"
        };
        let isMobileDevice = detectDevice();

        // ======================
        // INITIALISATION
        // ======================
        document.addEventListener('DOMContentLoaded', () => {
            applyTheme();
            initPanel();
            renderFavorites();
            updateFavCount();
            loadSettings();
            checkForUpdates();

            // Fermer le menu des filtres en cliquant ailleurs
            document.addEventListener('click', (e) => {
                const filterMenu = document.getElementById('filterMenu');
                const filterBtn = document.querySelector('.filter-btn');
                if (filterBtn && !filterBtn.contains(e.target) && filterMenu && !filterMenu.contains(e.target)) {
                    filterMenu.classList.remove('active');
                }
            });

            // Chargement infini
            window.addEventListener('scroll', () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500 && !isLoading) {
                    loadNewContent(settings.cardsPerLoad / 2);
                }
            });

            // Redimensionnement
            window.addEventListener('resize', () => {
                const newDeviceType = detectDevice();
                if (newDeviceType !== isMobileDevice) {
                    isMobileDevice = newDeviceType;
                    location.reload(); // Recharger pour appliquer les styles mobiles/desktop
                }
            });
        });

        // ======================
        // FONCTIONS PRINCIPALES
        // ======================
        function initPanel() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = '';
            LABELS.forEach((label, index) => {
                const btn = document.createElement('div');
                btn.className = `cat-tag ${CATEGORIES[index] === currentCategory ? 'active' : ''}`;
                btn.innerText = label;
                btn.onclick = () => {
                    currentCategory = CATEGORIES[index];
                    document.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('mainGrid').innerHTML = '';
                    loadedUrls.clear();
                    loadNewContent(settings.cardsPerLoad);
                };
                container.appendChild(btn);
            });
            loadNewContent(settings.cardsPerLoad);
        }

        async function loadNewContent(count) {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('loadMoreBtn').disabled = true;

            const promises = [];
            for (let i = 0; i < count; i++) {
                promises.push(
                    fetch(API_URLS[currentCategory] || API_URLS.pgif)
                        .then(res => {
                            if (!res.ok) throw new Error('Erreur API');
                            return res.json();
                        })
                        .then(data => {
                            if (data && data.message && !loadedUrls.has(data.message)) {
                                loadedUrls.add(data.message);
                                return data.message;
                            }
                            return null;
                        })
                        .catch(err => {
                            console.error("Erreur lors du chargement:", err);
                            return null;
                        })
                );
            }

            const results = await Promise.all(promises);
            results.forEach(url => {
                if (url) renderCard(url);
            });

            isLoading = false;
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('loadMoreBtn').disabled = false;
        }

        function renderCard(url) {
            const isVideo = url.match(/\.(mp4|webm|mov)$/i);
            const isGif = url.match(/\.gif$/i);
            const refID = "REF-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            const card = document.createElement('div');
            card.className = 'media-card';
            card.setAttribute('data-ref', refID);
            card.setAttribute('data-url', url);
            card.setAttribute('data-type', isVideo ? 'video' : isGif ? 'gif' : 'image');

            // Masquer les cartes qui ne correspondent pas au filtre actuel
            if (currentFilter !== "all" && !card.getAttribute('data-type').includes(currentFilter)) {
                card.style.display = 'none';
            }

            card.innerHTML = `
                <div class="thumbnail-container" onclick="handleCardClick(this, '${url.replace(/'/g, "\\'")}')">
                    ${settings.spoilerEnabled ? '<div class="card-spoiler"><i class="fas fa-eye-slash"></i><span>VOIR</span></div>' : ''}
                    ${isVideo ? `<video src="${url}" loop muted playsinline></video>` : `<img src="${url}" loading="lazy" onerror="this.parentElement.parentElement.style.display='none'">`}
                </div>
                <div class="card-info">
                    <span class="card-ref">${refID}</span>
                    <div class="card-actions">
                        <i class="fas fa-download download" onclick="downloadMedia('${url.replace(/'/g, "\\'")}', event)"></i>
                        <i class="fas fa-heart fav ${favs.includes(url) ? 'active' : ''}" onclick="toggleFavorite('${url.replace(/'/g, "\\'")}', this, event)"></i>
                    </div>
                </div>
            `;
            document.getElementById('mainGrid').appendChild(card);
        }

        function handleCardClick(container, url) {
            const spoiler = container.querySelector('.card-spoiler');
            if (spoiler && !spoiler.classList.contains('hidden')) {
                spoiler.classList.add('hidden');
                const video = container.querySelector('video');
                if (video) video.play();
            } else {
                openViewer(url);
            }
        }

        function openViewer(url) {
            currentViewerUrl = url;
            const isVid = url.match(/\.(mp4|webm|mov)$/i);
            const injection = document.getElementById('viewer-injection');
            injection.innerHTML = isVid
                ? `<video src="${url}" class="viewer-content" controls autoplay loop></video>`
                : `<img src="${url}" class="viewer-content">`;

            const viewerFavIcon = document.getElementById('viewerFavIcon');
            if (favs.includes(url)) {
                viewerFavIcon.classList.add('active');
                viewerFavIcon.style.color = 'var(--accent)';
            } else {
                viewerFavIcon.classList.remove('active');
                viewerFavIcon.style.color = 'var(--text-muted)';
            }

            document.getElementById('media-viewer').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('media-viewer').classList.remove('active');
            document.body.style.overflow = '';
            const video = document.querySelector('#viewer-injection video');
            if (video) video.pause();
        }

        function toggleFavorite(url, el, event) {
            if (event) event.stopPropagation();
            if (favs.includes(url)) {
                favs = favs.filter(f => f !== url);
                if (el) {
                    el.classList.remove('active');
                    el.style.color = 'var(--text-muted)';
                }
                showNotification("Retire des favoris", "warning");
            } else {
                favs.push(url);
                if (el) {
                    el.classList.add('active');
                    el.style.color = 'var(--accent)';
                }
                showNotification("Ajoute aux favoris", "success");
            }
            localStorage.setItem('maila_favs_v12', JSON.stringify(favs));
            renderFavorites();
            updateFavCount();

            if (currentViewerUrl === url) {
                const viewerFavIcon = document.getElementById('viewerFavIcon');
                if (favs.includes(url)) {
                    viewerFavIcon.classList.add('active');
                    viewerFavIcon.style.color = 'var(--accent)';
                } else {
                    viewerFavIcon.classList.remove('active');
                    viewerFavIcon.style.color = 'var(--text-muted)';
                }
            }
        }

        function renderFavorites() {
            const display = document.getElementById('favoritesDisplay');
            display.innerHTML = favs.length
                ? ''
                : '<p style="grid-column: 1/-1; opacity:0.5; text-align:center; padding:20px;">Aucun favori pour le moment.</p>';

            favs.forEach(url => {
                const item = document.createElement('div');
                item.className = 'fav-item';
                item.onclick = () => {
                    toggleModal('favModal');
                    openViewer(url);
                };
                item.innerHTML = `
                    <button class="remove-fav-btn" onclick="event.stopPropagation(); toggleFavorite('${url.replace(/'/g, "\\'")}', null, event)">
                        <i class="fas fa-trash"></i>
                    </button>
                    ${url.match(/\.(mp4|webm|mov)$/i)
                        ? `<video src="${url}" muted loop></video>`
                        : `<img src="${url}" loading="lazy" onerror="this.parentElement.style.display='none'">`}
                `;
                display.appendChild(item);
            });
        }

        function updateFavCount() {
            const countEl = document.getElementById('favCount');
            const mobileCountEl = document.getElementById('mobileFavCount');
            if (countEl) countEl.textContent = favs.length;
            if (mobileCountEl) mobileCountEl.textContent = favs.length;
        }

        function toggleModal(id) {
            if (id === 'favModal') renderFavorites();
            document.getElementById(id).classList.toggle('active');
            document.body.style.overflow = document.getElementById(id).classList.contains('active')
                ? 'hidden'
                : '';
        }

        function applyFilter() {
            const q = document.getElementById('searchBox').value.toUpperCase();
            document.querySelectorAll('.media-card').forEach(c => {
                const ref = c.getAttribute('data-ref');
                const type = c.getAttribute('data-type');
                const matchesRef = ref.includes(q);
                const matchesType = type.toUpperCase().includes(q);
                const matchesFilter = currentFilter === "all" || type.includes(currentFilter);
                c.style.display = (matchesRef || matchesType) && matchesFilter ? 'block' : 'none';
            });
        }

        function filterFavorites() {
            const q = document.getElementById('favSearchBox').value.toLowerCase();
            document.querySelectorAll('#favoritesDisplay .fav-item').forEach(item => {
                const url = item.querySelector('img, video').src.toLowerCase();
                item.style.display = url.includes(q) ? 'block' : 'none';
            });
        }

        function showNotification(msg, type = "info") {
            const t = document.createElement('div');
            t.className = `toast-msg ${type}`;
            t.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                ${msg}
            `;
            document.getElementById('notification-center').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function downloadMedia(url, event) {
            if (event) event.stopPropagation();
            const a = document.createElement('a');
            a.href = url;
            a.download = url.split('/').pop().split('?')[0];
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showNotification("Telechargement demarre", "success");
        }

        function downloadCurrentMedia() {
            if (currentViewerUrl) {
                downloadMedia(currentViewerUrl);
            }
        }

        // ======================
        // FONCTIONS DES FILTRES
        // ======================
        function toggleFilterMenu(event) {
            event.stopPropagation();
            const filterMenu = document.getElementById('filterMenu');
            filterMenu.classList.toggle('active');
        }

        function setFilter(type) {
            currentFilter = type;
            document.getElementById('filterMenu').classList.remove('active');
            document.querySelectorAll('.media-card').forEach(card => {
                const cardType = card.getAttribute('data-type');
                const shouldShow = type === "all" || cardType.includes(type);
                card.style.display = shouldShow ? '' : 'none';
            });
            showNotification(`Filtre applique: ${type === "all" ? "Tout" : type === "gif" ? "GIFs" : type.charAt(0).toUpperCase() + type.slice(1)}`, "success");
        }

        // ======================
        // MENU MOBILE
        // ======================
        function toggleMobileMenu() {
            const mobileMenu = document.getElementById('mobileMenu');
            mobileMenu.classList.toggle('active');
        }

        // ======================
        // FONCTIONS AVANCEES
        // ======================
        function toggleTheme() {
            settings.theme = settings.theme === "dark" ? "light" : "dark";
            document.body.setAttribute('data-theme', settings.theme);
            localStorage.setItem('maila_settings_v12', JSON.stringify(settings));
            updateThemeIcon();
            applyTheme();
            showNotification(`Theme ${settings.theme === "dark" ? "sombre" : "clair"} active`);
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.className = settings.theme === "dark" ? "fas fa-moon" : "fas fa-sun";
            }
        }

        function applyTheme() {
            document.body.setAttribute('data-theme', settings.theme);
            updateThemeIcon();
            document.documentElement.style.setProperty('--accent', settings.themeColor || '#ff2d7a');
            document.documentElement.style.setProperty('--accent-glow', settings.themeColor ? settings.themeColor + '50' : 'rgba(255, 45, 122, 0.5)');
        }

        function updateThemeColor() {
            const color = document.getElementById('themeColor').value;
            settings.themeColor = color;
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-glow', color + '50');
            localStorage.setItem('maila_settings_v12', JSON.stringify(settings));
        }

        function toggleSettings() {
            document.getElementById('settingsModal').classList.toggle('active');
        }

        function loadSettings() {
            document.getElementById('cardsPerLoad').value = settings.cardsPerLoad;
            document.getElementById('autoPlayVideos').value = settings.autoPlayVideos;
            document.getElementById('spoilerEnabled').value = settings.spoilerEnabled;
            document.getElementById('themeColor').value = settings.themeColor || '#ff2d7a';
        }

        function updateSettings() {
            settings.cardsPerLoad = parseInt(document.getElementById('cardsPerLoad').value);
            settings.autoPlayVideos = document.getElementById('autoPlayVideos').value === 'true';
            settings.spoilerEnabled = document.getElementById('spoilerEnabled').value === 'true';
            localStorage.setItem('maila_settings_v12', JSON.stringify(settings));

            document.getElementById('mainGrid').innerHTML = '';
            loadedUrls.clear();
            loadNewContent(settings.cardsPerLoad);

            showNotification("Parametres mis a jour", "success");
        }

        function toggleFullscreen() {
            const viewer = document.getElementById('media-viewer');
            if (!document.fullscreenElement) {
                viewer.requestFullscreen().catch(err => {
                    showNotification("Erreur en mode plein ecran: " + err.message, "error");
                });
            } else {
                document.exitFullscreen();
            }
        }

        function exportFavorites() {
            const data = JSON.stringify(favs, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'maila_favorites_' + new Date().toISOString().split('T')[0] + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showNotification("Favoris exporte", "success");
        }

        function importFavorites(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importedFavs = JSON.parse(e.target.result);
                    if (Array.isArray(importedFavs)) {
                        favs = [...new Set([...favs, ...importedFavs])];
                        localStorage.setItem('maila_favs_v12', JSON.stringify(favs));
                        renderFavorites();
                        updateFavCount();
                        showNotification(`${importedFavs.length} favoris importes`, "success");
                    } else {
                        showNotification("Fichier invalide", "error");
                    }
                } catch (err) {
                    showNotification("Erreur lors de l'import: " + err.message, "error");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function checkForUpdates() {
            setTimeout(() => {
                if (Math.random() > 0.7) {
                    showNotification("Nouvelle version disponible (v12.0)", "info");
                }
            }, 2000);
        }

        // ======================
        // RACCOURCIS CLAVIER
        // ======================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeViewer();
                document.querySelectorAll('.modal-overlay.active').forEach(modal => {
                    toggleModal(modal.id);
                });
                document.getElementById('settingsModal').classList.remove('active');
                document.getElementById('filterMenu').classList.remove('active');
                document.getElementById('mobileMenu').classList.remove('active');
            }
        });
    </script>
</body>
</html>
